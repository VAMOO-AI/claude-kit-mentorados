# Template de CI — GitHub Actions
#
# Copie para .github/workflows/ci.yml no seu repo.
# Roda typecheck + lint + testes em todo push e em PRs pra main.
# Ajuste os comandos aos scripts do seu package.json.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      # Descomente/ajuste conforme o seu projeto:

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Testes
        run: npm test --if-present

      # - name: Build
      #   run: npm run build

  # Segurança automática (opcional, recomendado): Semgrep faz SAST e manda os achados
  # pro "Security" do GitHub. De graça e pega muita coisa cedo. Ver docs/seguranca.md.
  seguranca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # pra subir o SARIF pro code scanning
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Semgrep
        run: python -m pip install --upgrade semgrep
      - name: Rodar Semgrep (SARIF)
        continue-on-error: true   # não trava o PR; os achados aparecem no "Security"
        run: semgrep scan --config auto --sarif --output semgrep.sarif .
      - name: Subir resultado pro GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
