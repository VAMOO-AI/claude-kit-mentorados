# CI do próprio kit — valida o que o instalador entrega.
# (O kit ensina "verify, don't claim"; isso aqui é a regra valendo pra ele mesmo.)
name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: settings.json é JSON válido
        run: python3 -m json.tool settings.json > /dev/null

      - name: Sintaxe dos scripts shell
        run: |
          bash -n install.sh
          bash -n statusline-command.sh
          find hooks scripts skills -name '*.sh' -type f -print -exec bash -n {} \;

      - name: Instalador roda limpo em HOME temporário (com --dry-run antes)
        run: |
          export HOME="$(mktemp -d)"
          bash install.sh --dry-run
          bash install.sh
          test -f "$HOME/.claude/CLAUDE.md"
          test -d "$HOME/.claude/skills/find-docs"
          test -f "$HOME/.claude/.kit-manifest"

      - name: Links Markdown internos existem
        run: |
          python3 - <<'EOF'
          import re, pathlib, sys
          missing = []
          for md in pathlib.Path('.').rglob('*.md'):
              if '.git/' in str(md): continue
              for target in re.findall(r'\]\(([^)]+)\)', md.read_text(encoding='utf-8', errors='ignore')):
                  target = target.split('#')[0].strip()
                  if not target or target.startswith(('http://', 'https://', 'mailto:', '<')): continue
                  if not (md.parent / target).exists():
                      missing.append(f'{md}: {target}')
          if missing:
              print('\n'.join(missing)); sys.exit(1)
          print('todos os links internos ok')
          EOF

      - name: Frontmatter das skills bate com o nome da pasta
        run: |
          fail=0
          for skill in skills/*/SKILL.md; do
            dir="$(basename "$(dirname "$skill")")"
            name="$(awk -F': *' '/^name:/{gsub(/\r/,""); print $2; exit}' "$skill")"
            if [ "$name" != "$dir" ]; then
              echo "MISMATCH: $skill (name=$name, pasta=$dir)"; fail=1
            fi
          done
          exit $fail

      - name: Secrets (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.21.2 \
            detect --source /repo --no-git --redact

      - name: Dependências vulneráveis (osv-scanner)
        run: |
          curl -sSfL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.1/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
          code=0; osv-scanner scan source -r . || code=$?
          # exit 128 = "No package sources found" — o kit é só markdown + shell, sem
          # manifest de deps (package.json/requirements.txt). Nada a escanear = ok.
          # Outros códigos (ex: 1 = vulnerabilidade encontrada) continuam falhando.
          if [ "$code" = "128" ]; then echo "sem manifests de dependência — nada a escanear"; exit 0; fi
          exit "$code"
